<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Player para musica</title>
  </head>
  <body>
    <header>
      <h1>Interactive Player</h1>
    </header>
    <main>
      <div id="containerAlbum">
        <img id="album" alt="capa do album">
        <h2 id="nomeAlbum"></h2>
        <p id="anoAlbum"></p>
        <section id="controlsplayer">
          <button id="anterior">anterior ⏮️</button>
          <button id="playpause">play / pause ▶️ </button>
          <button id="proxima">proxima ⏭️</button>
        </section>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
